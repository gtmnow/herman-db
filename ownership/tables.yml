version: 1
baseline_revision: "20260504_0006"
tables:
  - table_name: auth_users
    class: core
    write_owner: shared
    readers: [Herman-Admin, herman_portal, herman-prompt, prompt_transformer]
    authority_status: authoritative_with_derived_pointer
    lifecycle: persistent
    notes: Canonical platform identity table; auth_users.tenant_id is a derived compatibility pointer synced from primary membership.
  - table_name: admin_users
    class: core
    write_owner: Herman-Admin
    readers: [Herman-Admin, herman_portal]
    authority_status: authoritative
    lifecycle: persistent
    notes: Canonical admin entitlement table.
  - table_name: user_tenant_membership
    class: core
    write_owner: Herman-Admin
    readers: [Herman-Admin, herman_portal, herman-prompt]
    authority_status: authoritative_target
    lifecycle: persistent
    notes: Intended canonical user-to-tenant membership table.
  - table_name: user_invitations
    class: shared-owned
    write_owner: Herman-Admin
    readers: [herman_portal]
    authority_status: current_state_plus_history
    lifecycle: current_state_plus_history
    notes: Current-state semantics are explicit via is_current while historical invitation rows are retained.
  - table_name: password_reset_tokens
    class: app-local
    write_owner: herman_portal
    readers: [herman_portal]
    authority_status: authoritative
    lifecycle: expiring
    notes: Portal-only token table aligned on canonical user_id_hash authority.
  - table_name: type_detail
    class: core
    write_owner: prompt_transformer
    readers: [prompt_transformer, herman-prompt, Herman-Admin]
    authority_status: foundational_profile
    lifecycle: persistent
    notes: Foundational profile layer.
  - table_name: final_profile
    class: derived
    write_owner: prompt_transformer
    readers: [prompt_transformer, herman-prompt, Herman-Admin]
    authority_status: derived_runtime_authority
    lifecycle: recomputable
    notes: Runtime-effective profile derived from foundational and overlay layers.
  - table_name: conversation_prompt_scores
    class: derived
    write_owner: prompt_transformer
    readers: [prompt_transformer, herman-prompt, Herman-Admin]
    authority_status: derived
    lifecycle: retention_policy_required
    notes: Derived analytics retained with explicit orphan markers instead of unmanaged dangling rows.
  - table_name: user_membership_profiles
    class: shared-owned
    write_owner: Herman-Admin
    readers: [Herman-Admin]
    authority_status: membership_metadata_only
    lifecycle: persistent
    notes: Narrow membership metadata table; identity and usage analytics are derived from canonical auth and conversation/profile tables.
  - table_name: reseller_tenant_defaults
    class: shared-owned
    write_owner: Herman-Admin
    readers: [Herman-Admin]
    authority_status: normalized_template
    lifecycle: persistent
    notes: Template layer remains intentionally parallel to tenant runtime tables, but platform-managed LLM defaults no longer store duplicated provider/model/endpoint values.
  - table_name: rag_quota_policies
    class: shared-owned
    write_owner: Herman-Admin
    readers: [Herman-Admin, herman-prompt, prompt_transformer]
    authority_status: authoritative
    lifecycle: persistent
    notes: Canonical RAG quota policy table resolved by runtime precedence across default, service tier, and tenant override scopes.
  - table_name: rag_collections
    class: shared-owned
    write_owner: prompt_transformer
    readers: [prompt_transformer, Herman-Admin, herman-prompt]
    authority_status: authoritative
    lifecycle: persistent
    notes: Canonical collection registry for tenant-scoped knowledge and user-scoped personal context repositories.
  - table_name: rag_documents
    class: shared-owned
    write_owner: prompt_transformer
    readers: [prompt_transformer, Herman-Admin, herman-prompt]
    authority_status: authoritative
    lifecycle: persistent
    notes: Canonical uploaded document metadata for RAG sources across tenant and user scopes.
  - table_name: rag_document_blobs
    class: shared-owned
    write_owner: prompt_transformer
    readers: [prompt_transformer]
    authority_status: authoritative
    lifecycle: retention_policy_required
    notes: Source file bytes retained in the shared database for v1 RAG ingestion.
  - table_name: rag_chunks
    class: derived
    write_owner: prompt_transformer
    readers: [prompt_transformer]
    authority_status: derived
    lifecycle: recomputable
    notes: Chunked document text and derived embedding payloads used by RAG retrieval.
  - table_name: rag_retrieval_events
    class: derived
    write_owner: prompt_transformer
    readers: [prompt_transformer, Herman-Admin]
    authority_status: derived
    lifecycle: retention_policy_required
    notes: Retrieval event log recording which chunks contributed to runtime context assembly.
  - table_name: conversations
    class: shared-owned
    write_owner: herman-prompt
    readers: [herman-prompt, prompt_transformer, Herman-Admin]
    authority_status: authoritative
    lifecycle: persistent
    notes: Canonical conversation header table.
  - table_name: conversation_turns
    class: shared-owned
    write_owner: herman-prompt
    readers: [herman-prompt, prompt_transformer, Herman-Admin]
    authority_status: authoritative_with_derived_columns
    lifecycle: persistent
    notes: Canonical transcript rows.
